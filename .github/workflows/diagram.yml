name: diagram

# Regenerate the worldview-tree diagram, verify the render pipeline, and (from
# the default branch) publish it to GitHub Pages.
#
# The diagram is built from the assumptions/ layout: generate.py runs the
# Python assumption chain for every worldview (node), which renders that
# worldview's standalone Squiggle model and the graph JSON; build_diagram.py
# then lays the tree out and prints the public draw.io view link.
#
# Two independent ways the images reach a reader, so neither is a single point of
# failure:
#   1. The rendered PNG + SVG are COMMITTED (diagram/train_tree.{png,svg}) and
#      the README links them via raw.githubusercontent URLs -- these work with no
#      repo settings at all.
#   2. This workflow also publishes them to GitHub Pages at
#      https://<owner>.github.io/train_to_crazy_town/ -- this needs a one-time
#      setup: repo Settings -> Pages -> Build and deployment -> Source =
#      "GitHub Actions". Until that is done the `deploy` job (default branch
#      only) fails fast; the `render` job and the committed raw-URL images are
#      unaffected.
#
# Regenerate locally after changing the assumptions or the diagram:
#     python generate.py                   # worldview graph + squiggle models
#     python diagram/build_diagram.py      # editable .drawio
#     python diagram/render_diagram.py     # train_tree.png + train_tree.svg
#     git add diagram/train_tree.* squiggle/worldviews

on:
  push:
    paths: ["diagram/**", "assumptions/**", "generate.py", ".github/workflows/diagram.yml"]
  pull_request:
    paths: ["diagram/**", "assumptions/**", "generate.py", ".github/workflows/diagram.yml"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Graphviz (dot)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Run the assumption chains (assert generated files are current)
        run: python generate.py --check

      - name: Build editable .drawio from train_tree.json
        run: python diagram/build_diagram.py

      - name: Render PNG + SVG from train_tree.json
        run: python diagram/render_diagram.py

      - name: Assert the render produced non-empty images
        run: |
          set -e
          for f in diagram/train_tree.png diagram/train_tree.svg; do
            test -s "$f" || { echo "::error::$f is missing or empty"; exit 1; }
          done
          file diagram/train_tree.png | grep -q 'PNG image data' \
            || { echo "::error::train_tree.png is not a valid PNG"; exit 1; }
          echo "Render OK:"; ls -l diagram/train_tree.png diagram/train_tree.svg

      - name: Assemble Pages site
        run: |
          mkdir -p _site
          cp diagram/train_tree.png _site/train_tree.png
          cp diagram/train_tree.svg _site/train_tree.svg
          touch _site/.nojekyll
          cat > _site/index.html <<'HTML'
          <!doctype html><meta charset="utf-8"><title>Train to crazy town - diagram</title>
          <h1>Train to crazy town</h1>
          <p>Every node is a worldview; click one to open its Squiggle model in a
          live playground.
          <a href="https://viewer.diagrams.net/?lightbox=1&nav=1&chrome=0#Uhttps%3A%2F%2Fraw.githubusercontent.com%2Fmorganrivers%2Ftrain_to_crazy_town%2Fmain%2Fdiagram%2Ftrain_tree.drawio">draw.io viewer</a>
          &middot; <a href="train_tree.svg">SVG</a> &middot; <a href="train_tree.png">PNG</a></p>
          <!-- <object>, not <img>: keeps the SVG's clickable node links working -->
          <object data="train_tree.svg" type="image/svg+xml" style="max-width:100%">
            <img src="train_tree.png" alt="Worldview tree" style="max-width:100%">
          </object>
          HTML

      - name: Upload rendered diagram (downloadable from any run)
        uses: actions/upload-artifact@v4
        with:
          name: diagram
          path: |
            diagram/train_tree.png
            diagram/train_tree.svg

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: render
    # Publish to Pages only from the default branch. This job fails until Pages
    # is enabled (Settings -> Pages -> Source = "GitHub Actions"); the render job
    # and the committed raw-URL images do not depend on it.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
