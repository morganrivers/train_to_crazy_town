name: sync

# Enforce the single source of truth: the assumption chains in assumptions/
# drive allocate.py, the diagram graph (diagram/train_tree.json) and the
# generated Squiggle worldview models. This job composes every worldview by
# running its assumption chain and fails if any committed generated copy has
# drifted, so a number can never be edited in one representation without the
# others.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Assert generated files are in sync with assumptions/
        run: python3 test_worldviews.py
